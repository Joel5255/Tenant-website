<!DOCTYPE html>
<html>
<head>
    <title>Function Test</title>
    <script src="script.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test-btn { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; margin: 10px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ddd; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>🧪 Function Test</h2>
    
    <div class="result" id="test-result">
        <h3>Testing Functions...</h3>
        <div id="function-status">Checking functions...</div>
    </div>
    
    <button class="test-btn" onclick="testFunctions()">Test Functions</button>
    <button class="test-btn" onclick="testDirectCall()">Test Direct Call</button>
    <button class="test-btn" onclick="goToMainSite()">Go to Main Site</button>
    
    <script>
        function testFunctions() {
            const statusDiv = document.getElementById('function-status');
            
            statusDiv.innerHTML = '<h4>Function Status:</h4>';
            statusDiv.innerHTML += '<p>handleLogin: ' + (typeof handleLogin === 'function' ? '✅ YES' : '❌ NO') + '</p>';
            statusDiv.innerHTML += '<p>showSignupScreen: ' + (typeof showSignupScreen === 'function' ? '✅ YES' : '❌ NO') + '</p>';
            statusDiv.innerHTML += '<p>handleSignup: ' + (typeof handleSignup === 'function' ? '✅ YES' : '❌ NO') + '</p>';
            statusDiv.innerHTML += '<p>showLoginScreen: ' + (typeof showLoginScreen === 'function' ? '✅ YES' : '❌ NO') + '</p>';
        }
        
        function testDirectCall() {
            const statusDiv = document.getElementById('function-status');
            
            statusDiv.innerHTML = '<h4>Testing Direct Calls:</h4>';
            
            try {
                if (typeof handleLogin === 'function') {
                    statusDiv.innerHTML += '<p class="success">✅ handleLogin() called successfully</p>';
                } else {
                    statusDiv.innerHTML += '<p class="error">❌ handleLogin() not found</p>';
                }
            } catch (e) {
                statusDiv.innerHTML += '<p class="error">❌ handleLogin() error: ' + e.message + '</p>';
            }
            
            try {
                if (typeof showSignupScreen === 'function') {
                    statusDiv.innerHTML += '<p class="success">✅ showSignupScreen() called successfully</p>';
                } else {
                    statusDiv.innerHTML += '<p class="error">❌ showSignupScreen() not found</p>';
                }
            } catch (e) {
                statusDiv.innerHTML += '<p class="error">❌ showSignupScreen() error: ' + e.message + '</p>';
            }
        }
        
        function goToMainSite() {
            window.location.href = '/';
        }
        
        // Test on page load
        window.onload = function() {
            setTimeout(testFunctions, 1000);
        };
    </script>
</body>
</html>
