services:
  # PHP Web Service
  - type: web
    name: financial-literacy-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
    healthCheckPath: /index.html

  # PostgreSQL Database
  - type: pserv
    name: financial-literacy-db
    plan: free
    startCommand: "docker-entrypoint.sh postgres"
    envVars:
      - key: POSTGRES_USER
        value: financial_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: financial_literacy
